<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🖥️ Brand AI · Hacker Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body {
            font-family: 'Share Tech Mono', monospace;
            background: #0a0a0a;
            color: #00ff41;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.08;
            overflow: hidden;
        }
        
        #matrix-bg canvas {
            width: 100%;
            height: 100%;
        }
        
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, -2px); }
            60% { transform: translate(-1px, 1px); }
            80% { transform: translate(1px, -1px); }
            100% { transform: translate(0); }
        }
        
        .glitch-text { animation: glitch 0.3s infinite; }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,255,65,0.02) 0px, rgba(0,255,65,0.02) 2px, transparent 2px, transparent 4px);
            pointer-events: none;
            z-index: 999;
        }
        
        .app-header {
            background: rgba(10, 10, 10, 0.95);
            border-bottom: 2px solid #00ff41;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.4rem;
            color: #00ff41;
            text-shadow: 0 0 20px #00ff41, 0 0 40px #00ff41;
        }
        
        .brand i { font-size: 1.8rem; animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .brand span { letter-spacing: 3px; }
        
        .header-actions { display: flex; gap: 12px; align-items: center; }
        
        .header-actions button {
            background: transparent;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .header-actions button:hover {
            background: #00ff41;
            color: #0a0a0a;
            box-shadow: 0 0 20px #00ff41;
        }
        
        .status-badge {
            color: #00ff41;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border: 1px solid #00ff41;
            border-radius: 4px;
        }
        
        .status-badge i { font-size: 0.5rem; animation: blink 1s infinite; }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        .chat-container {
            display: flex;
            height: calc(100vh - 65px);
            position: relative;
            z-index: 10;
        }
        
        .sidebar {
            width: 260px;
            background: rgba(10, 10, 10, 0.95);
            border-right: 2px solid #00ff41;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            flex-shrink: 0;
            backdrop-filter: blur(10px);
        }
        
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: #0a0a0a; }
        .sidebar::-webkit-scrollbar-thumb { background: #00ff41; }
        
        .sidebar-title {
            color: #00ff41;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #00ff41;
            padding-bottom: 8px;
        }
        
        .sidebar .new-chat-btn {
            background: transparent;
            border: 2px solid #00ff41;
            color: #00ff41;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            transition: all 0.3s;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .sidebar .new-chat-btn:hover {
            background: #00ff41;
            color: #0a0a0a;
            box-shadow: 0 0 20px #00ff41;
        }
        
        .convo-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .convo-list .item {
            padding: 8px 12px;
            border: 1px solid transparent;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.8rem;
            color: #00ff41;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .convo-list .item:hover {
            border-color: #00ff41;
            background: rgba(0, 255, 65, 0.05);
        }
        
        .convo-list .item.active {
            border-color: #00ff41;
            background: rgba(0, 255, 65, 0.1);
        }
        
        .sidebar-stats {
            border-top: 2px solid #00ff41;
            padding-top: 12px;
            font-size: 0.7rem;
            color: #00ff41;
            opacity: 0.7;
            display: flex;
            justify-content: space-between;
        }
        
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(5px);
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-track { background: #0a0a0a; }
        .messages::-webkit-scrollbar-thumb { background: #00ff41; }
        
        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 4px;
            line-height: 1.6;
            font-size: 0.9rem;
            animation: fadeIn 0.3s ease;
        }
        
        .message.user {
            align-self: flex-end;
            background: rgba(0, 255, 65, 0.1);
            border: 2px solid #00ff41;
            border-right: none;
        }
        
        .message.bot {
            align-self: flex-start;
            background: rgba(0, 255, 65, 0.05);
            border: 2px solid #00ff41;
            border-left: none;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message .msg-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            opacity: 0.6;
            margin-bottom: 4px;
        }
        
        .message .msg-content { word-wrap: break-word; }
        
        .message .msg-content pre {
            background: rgba(0, 0, 0, 0.5);
            padding: 12px;
            border-radius: 4px;
            margin: 8px 0;
            border-left: 2px solid #00ff41;
            overflow-x: auto;
        }
        
        .message .msg-content code {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
        }
        
        .message .actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        
        .message .actions button {
            background: transparent;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 2px 12px;
            border-radius: 3px;
            font-size: 0.65rem;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            transition: all 0.3s;
        }
        
        .message .actions button:hover {
            background: #00ff41;
            color: #0a0a0a;
        }
        
        .typing-indicator {
            align-self: flex-start;
            background: rgba(0, 255, 65, 0.05);
            border: 2px solid #00ff41;
            padding: 10px 20px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
        }
        
        .typing-indicator .dot {
            width: 6px;
            height: 6px;
            background: #00ff41;
            border-radius: 50%;
            display: inline-block;
            animation: typingPulse 1.4s infinite;
        }
        
        .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typingPulse {
            0%, 60%, 100% { opacity: 0.2; transform: scale(0.8); }
            30% { opacity: 1; transform: scale(1.2); }
        }
        
        .input-area {
            background: rgba(10, 10, 10, 0.95);
            border-top: 2px solid #00ff41;
            padding: 12px 20px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            backdrop-filter: blur(10px);
        }
        
        .input-area textarea {
            flex: 1;
            background: transparent;
            border: 2px solid #00ff41;
            border-radius: 4px;
            padding: 10px 16px;
            color: #00ff41;
            resize: none;
            font-size: 0.9rem;
            outline: none;
            line-height: 1.4;
            max-height: 120px;
            font-family: 'Share Tech Mono', monospace;
        }
        
        .input-area textarea:focus {
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }
        
        .input-area textarea::placeholder {
            color: #00ff41;
            opacity: 0.5;
        }
        
        .input-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        
        .input-actions button {
            background: transparent;
            border: 2px solid #00ff41;
            color: #00ff41;
            width: 44px;
            height: 44px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .input-actions button:hover {
            background: #00ff41;
            color: #0a0a0a;
            box-shadow: 0 0 20px #00ff41;
        }
        
        .input-actions button.primary {
            background: #00ff41;
            color: #0a0a0a;
        }
        
        .input-actions button.primary:hover {
            background: transparent;
            color: #00ff41;
        }
        
        @media (max-width: 768px) {
            .sidebar { width: 200px; padding: 12px; }
            .message { max-width: 90%; }
        }
        
        @media (max-width: 500px) {
            .sidebar { display: none; }
            .header-actions button { padding: 4px 8px; font-size: 0.6rem; }
            .messages { padding: 12px 16px; }
        }
    </style>
</head>
<body>

    <div id="matrix-bg">
        <canvas id="matrixCanvas"></canvas>
    </div>

    <header class="app-header">
        <div class="brand">
            <i class="fas fa-skull"></i>
            <span class="glitch-text">BRAND AI</span>
            <span style="font-size:0.6rem; opacity:0.5;">v3.0</span>
        </div>
        <div class="header-actions">
            <button id="newChatBtn"><i class="fas fa-plus"></i> NEW</button>
            <button id="exportBtn"><i class="fas fa-download"></i> EXPORT</button>
            <button id="stopBtn"><i class="fas fa-stop"></i> STOP</button>
            <span class="status-badge">
                <i class="fas fa-circle"></i> ONLINE
            </span>
        </div>
    </header>

    <div class="chat-container">
        <aside class="sidebar">
            <div class="sidebar-title"><i class="fas fa-database"></i> CHATS</div>
            <button class="new-chat-btn" id="sidebarNewChat">
                <i class="fas fa-plus"></i> NEW SESSION
            </button>
            <div class="convo-list" id="convoList"></div>
            <div class="sidebar-stats">
                <span><i class="fas fa-microchip"></i> TOKENS: <span id="tokenCount">0</span></span>
                <span><i class="fas fa-clock"></i> <span id="msgCount">0</span> MSGS</span>
            </div>
        </aside>

        <div class="chat-main">
            <div class="messages" id="messageContainer">
                <div class="message bot">
                    <div class="msg-header">
                        <span><i class="fas fa-robot"></i> BRAND AI</span>
                        <span>INITIALIZED</span>
                    </div>
                    <div class="msg-content">
                        <strong>> SYSTEM READY</strong><br>
                        Welcome to Brand AI Hacker Edition.<br>
                        Type your message to start.
                    </div>
                </div>
            </div>

            <div id="typingIndicator" class="typing-indicator" style="display:none; margin-left:30px; margin-bottom:6px;">
                <span>> BRAND AI</span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>

            <div class="input-area">
                <textarea id="chatInput" rows="1" placeholder="> Type message... (Bangla/English)"></textarea>
                <div class="input-actions">
                    <button id="voiceBtn" title="Voice Input"><i class="fas fa-microphone"></i></button>
                    <button id="ttsBtn" title="Voice Output"><i class="fas fa-volume-up"></i></button>
                    <button id="imageBtn" title="Image Analysis"><i class="fas fa-image"></i></button>
                    <button id="sendBtn" class="primary"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="imageUpload" accept="image/*" style="display:none">

    <script>
        // ============================================================
        // COMPLETE JAVASCRIPT - FIXED VERSION
        // ============================================================
        
        (function() {
            'use strict';
            
            // ===== STATE =====
            let currentChatId = null;
            let chats = JSON.parse(localStorage.getItem('brand_ai_chats') || '{}');
            let messages = [];
            let isGenerating = false;
            let abortController = null;
            let totalTokens = 0;
            
            // ===== DOM REFS =====
            const msgContainer = document.getElementById('messageContainer');
            const chatInput = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            const typingIndicator = document.getElementById('typingIndicator');
            const convoList = document.getElementById('convoList');
            const tokenCount = document.getElementById('tokenCount');
            const msgCount = document.getElementById('msgCount');
            
            // ===== MATRIX BACKGROUND =====
            function initMatrix() {
                const canvas = document.getElementById('matrixCanvas');
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                
                const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                const cols = Math.floor(canvas.width / 20);
                const drops = [];
                for (let i = 0; i < cols; i++) {
                    drops[i] = Math.floor(Math.random() * canvas.height / 20);
                }
                
                function draw() {
                    ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#00ff41';
                    ctx.font = '15px monospace';
                    
                    for (let i = 0; i < drops.length; i++) {
                        const text = chars[Math.floor(Math.random() * chars.length)];
                        ctx.fillText(text, i * 20, drops[i] * 20);
                        if (drops[i] * 20 > canvas.height && Math.random() > 0.975) {
                            drops[i] = 0;
                        }
                        drops[i]++;
                    }
                }
                setInterval(draw, 50);
            }
            initMatrix();
            
            // ===== CHAT MANAGEMENT =====
            function saveChats() {
                localStorage.setItem('brand_ai_chats', JSON.stringify(chats));
            }
            
            function loadChat(chatId) {
                if (!chats[chatId]) return;
                currentChatId = chatId;
                messages = chats[chatId].messages || [];
                renderMessages();
                updateSidebar();
                updateStats();
            }
            
            function newChat() {
                const id = 'chat_' + Date.now();
                chats[id] = {
                    title: 'New Chat ' + Object.keys(chats).length,
                    messages: [],
                    created: Date.now()
                };
                currentChatId = id;
                messages = [];
                saveChats();
                renderMessages();
                updateSidebar();
                updateStats();
                addMessage('bot', '> NEW SESSION INITIALIZED\nType your message to start.');
            }
            
            function updateSidebar() {
                convoList.innerHTML = '';
                const keys = Object.keys(chats).reverse();
                keys.forEach(id => {
                    const div = document.createElement('div');
                    div.className = 'item' + (id === currentChatId ? ' active' : '');
                    const title = chats[id].title || 'Chat';
                    const count = chats[id].messages ? chats[id].messages.length : 0;
                    div.innerHTML = `<i class="fas fa-comment"></i> ${title.substring(0, 20)} (${count})`;
                    div.onclick = () => loadChat(id);
                    convoList.appendChild(div);
                });
            }
            
            function updateStats() {
                tokenCount.textContent = totalTokens;
                msgCount.textContent = messages.filter(m => m.role === 'user').length;
            }
            
            // ===== MESSAGE RENDERING =====
            function renderMessages() {
                msgContainer.innerHTML = '';
                messages.forEach(msg => {
                    addMessageToUI(msg.role, msg.content, msg.tokens);
                });
                msgContainer.scrollTop = msgContainer.scrollHeight;
            }
            
            function addMessageToUI(role, content, tokens = 0) {
                const div = document.createElement('div');
                div.className = `message ${role}`;
                
                const header = document.createElement('div');
                header.className = 'msg-header';
                const icon = role === 'user' ? 'fa-user' : 'fa-robot';
                const name = role === 'user' ? 'USER' : 'BRAND AI';
                header.innerHTML = `<span><i class="fas ${icon}"></i> ${name}</span>
                                   <span>${new Date().toLocaleTimeString()}</span>`;
                div.appendChild(header);
                
                const contentDiv = document.createElement('div');
                contentDiv.className = 'msg-content';
                
                let processed = content;
                processed = processed.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                processed = processed.replace(/\*(.*?)\*/g, '<em>$1</em>');
                processed = processed.replace(/`([^`]+)`/g, '<code>$1</code>');
                processed = processed.replace(/\n/g, '<br>');
                
                contentDiv.innerHTML = processed;
                div.appendChild(contentDiv);
                
                if (role === 'bot') {
                    const actions = document.createElement('div');
                    actions.className = 'actions';
                    actions.innerHTML = `
                        <button onclick="copyMessage(this)"><i class="fas fa-copy"></i> COPY</button>
                        <button onclick="regenerateMessage()"><i class="fas fa-redo"></i> RETRY</button>
                    `;
                    div.appendChild(actions);
                }
                
                msgContainer.appendChild(div);
                msgContainer.scrollTop = msgContainer.scrollHeight;
            }
            
            // ===== ADD MESSAGE =====
            function addMessage(role, content, tokens = 0) {
                messages.push({ role, content, tokens });
                if (currentChatId && chats[currentChatId]) {
                    chats[currentChatId].messages = messages;
                    if (role === 'user' && messages.filter(m => m.role === 'user').length === 1) {
                        chats[currentChatId].title = content.substring(0, 30) + '...';
                    }
                    saveChats();
                    updateSidebar();
                    updateStats();
                }
                addMessageToUI(role, content, tokens);
            }
            
            // ===== SET TYPING =====
            function setTyping(visible) {
                typingIndicator.style.display = visible ? 'flex' : 'none';
                if (visible) msgContainer.scrollTop = msgContainer.scrollHeight;
            }
            
            // ===== SEND MESSAGE - FIXED =====
            async function sendMessage() {
                const text = chatInput.value.trim();
                if (!text) {
                    console.log('⚠️ Empty message');
                    return;
                }
                if (isGenerating) {
                    console.log('⏳ Already generating');
                    return;
                }
                
                console.log('📤 Sending message:', text);
                chatInput.value = '';
                addMessage('user', text);
                
                isGenerating = true;
                setTyping(true);
                abortController = new AbortController();
                
                try {
                    const messagesToSend = messages.map(m => ({ 
                        role: m.role, 
                        content: m.content 
                    }));
                    
                    console.log('📦 Messages to send:', messagesToSend);
                    
                    const response = await fetch('/chat', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            messages: messagesToSend
                        }),
                        signal: abortController.signal
                    });
                    
                    console.log('📥 Response status:', response.status);
                    
                    if (!response.ok) {
                        const errorText = await response.text();
                        console.error('❌ Error response:', errorText);
                        throw new Error(`HTTP ${response.status}: ${errorText}`);
                    }
                    
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let fullContent = '';
                    let botDiv = null;
                    
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) {
                            console.log('✅ Reader done');
                            break;
                        }
                        
                        const chunk = decoder.decode(value);
                        console.log('📦 Received chunk');
                        
                        const lines = chunk.split('\n').filter(l => l.trim());
                        
                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                const data = line.slice(6);
                                
                                if (data === '[DONE]') {
                                    console.log('✅ Stream complete');
                                    continue;
                                }
                                
                                try {
                                    const parsed = JSON.parse(data);
                                    
                                    if (parsed.error) {
                                        console.error('❌ API Error:', parsed.error);
                                        throw new Error(parsed.error);
                                    }
                                    
                                    const delta = parsed.content || '';
                                    if (delta) {
                                        fullContent += delta;
                                        
                                        if (!botDiv) {
                                            setTyping(false);
                                            botDiv = document.createElement('div');
                                            botDiv.className = 'message bot';
                                            msgContainer.appendChild(botDiv);
                                        }
                                        
                                        // Update streaming
                                        let display = fullContent;
                                        display = display.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                                        display = display.replace(/\*(.*?)\*/g, '<em>$1</em>');
                                        display = display.replace(/`([^`]+)`/g, '<code>$1</code>');
                                        display = display.replace(/\n/g, '<br>');
                                        
                                        botDiv.innerHTML = `<div class="msg-header"><span><i class="fas fa-robot"></i> BRAND AI</span><span>STREAMING</span></div>
                                            <div class="msg-content">${display}</div>`;
                                        msgContainer.scrollTop = msgContainer.scrollHeight;
                                    }
                                } catch (e) {
                                    console.error('❌ Parse error:', e);
                                }
                            }
                        }
                    }
                    
                    // Finalize
                    if (botDiv && fullContent) {
                        const finalContent = fullContent;
                        const tokens = Math.round(finalContent.length / 4);
                        totalTokens += tokens;
                        // Remove streaming message
                        botDiv.remove();
                        addMessage('bot', finalContent, tokens);
                        console.log('✅ Message complete, tokens:', tokens);
                    } else if (!fullContent) {
                        console.error('❌ No data received from server');
                        addMessage('bot', '> No response received. Please check API key and try again.');
                    }
                    
                } catch (error) {
                    console.error('❌ Error:', error);
                    if (error.name === 'AbortError') {
                        addMessage('bot', '> GENERATION STOPPED BY USER');
                    } else {
                        addMessage('bot', `> ERROR: ${error.message}`);
                    }
                } finally {
                    isGenerating = false;
                    setTyping(false);
                    abortController = null;
                }
            }
            
            // ===== GLOBAL FUNCTIONS =====
            window.copyMessage = function(btn) {
                const msg = btn.closest('.message');
                const text = msg.querySelector('.msg-content').textContent;
                navigator.clipboard.writeText(text).then(() => {
                    btn.innerHTML = '<i class="fas fa-check"></i> COPIED';
                    setTimeout(() => btn.innerHTML = '<i class="fas fa-copy"></i> COPY', 1500);
                });
            };
            
            window.regenerateMessage = function() {
                const msgs = msgContainer.querySelectorAll('.message');
                if (msgs.length > 0 && msgs[msgs.length-1].classList.contains('bot')) {
                    msgs[msgs.length-1].remove();
                    messages.pop();
                }
                const lastUser = messages.filter(m => m.role === 'user').pop();
                if (lastUser) {
                    chatInput.value = lastUser.content;
                    sendMessage();
                }
            };
            
            // ===== EVENT LISTENERS =====
            sendBtn.addEventListener('click', sendMessage);
            chatInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            document.getElementById('newChatBtn').addEventListener('click', newChat);
            document.getElementById('sidebarNewChat').addEventListener('click', newChat);
            
            document.getElementById('stopBtn').addEventListener('click', () => {
                if (abortController) {
                    abortController.abort();
                    isGenerating = false;
                    setTyping(false);
                }
            });
            
            document.getElementById('exportBtn').addEventListener('click', () => {
                const txt = messages.map(m => {
                    const role = m.role === 'user' ? 'USER' : 'BRAND AI';
                    return `[${role}]\n${m.content}\n`;
                }).join('\n---\n');
                const blob = new Blob([txt], { type: 'text/plain' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `brand_ai_export_${Date.now()}.txt`;
                a.click();
            });
            
            // Voice and Image (dummy)
            document.getElementById('voiceBtn').addEventListener('click', () => {
                alert('🎤 Voice input coming soon!');
            });
            document.getElementById('ttsBtn').addEventListener('click', () => {
                const lastBot = messages.filter(m => m.role === 'bot').pop();
                if (lastBot) {
                    const utterance = new SpeechSynthesisUtterance(lastBot.content);
                    utterance.lang = 'bn-BD';
                    speechSynthesis.speak(utterance);
                }
            });
            document.getElementById('imageBtn').addEventListener('click', () => {
                alert('🖼️ Image analysis coming soon!');
            });
            
            chatInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });
            
            // ===== INIT =====
            const keys = Object.keys(chats);
            if (keys.length > 0) {
                loadChat(keys[0]);
            } else {
                newChat();
            }
            
            // Test API connection
            fetch('/test')
                .then(res => res.json())
                .then(data => {
                    console.log('🔍 Health check:', data);
                    if (!data.api_key_set) {
                        console.error('❌ API KEY NOT SET!');
                        addMessage('bot', '⚠️ API key not set. Please set OPENAI_API_KEY.');
                    } else {
                        console.log('✅ API key is set');
                    }
                })
                .catch(err => console.error('Health check failed:', err));
            
            console.log('🖥️ BRAND AI HACKER EDITION LOADED');
            
        })();
    </script>
</body>
</html>
