<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand AI · ChatGPT Clone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0b0e14;
            color: #eaeef2;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        /* Header */
        .app-header {
            background: #141a22;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2a313c;
            flex-shrink: 0;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 1.3rem;
        }
        .brand i { color: #6c8cff; font-size: 1.6rem; }
        .brand span { background: linear-gradient(135deg, #b7c9ff, #6c8cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .header-actions button {
            background: transparent;
            border: none;
            color: #a8b3cf;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            padding: 6px;
        }
        .header-actions button:hover { color: #d6e0ff; transform: scale(1.05); }
        .badge { background: #2a3344; padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; color: #b7c9ff; }
        .status-badge { font-size: 0.7rem; background: #1f2a38; padding: 2px 12px; border-radius: 30px; color: #9bb0d0; }
        .status-badge i { color: #5f7cff; font-size: 0.5rem; }

        /* Main layout */
        .chat-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 240px;
            background: #11171f;
            border-right: 1px solid #232b36;
            padding: 18px 14px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .sidebar .new-chat-btn {
            background: #1e2631;
            border: 1px solid #2f3a48;
            border-radius: 30px;
            padding: 10px 16px;
            color: #b7c9ff;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar .new-chat-btn:hover { background: #2a3444; border-color: #4a5a78; }
        .sidebar .convo-list {
            margin-top: 4px;
            color: #8895b0;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .sidebar .convo-list .item {
            padding: 6px 10px;
            border-radius: 20px;
            background: #1a222d;
            cursor: default;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar .convo-list .item i { width: 16px; }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f141c;
            overflow: hidden;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 28px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .message {
            max-width: 82%;
            padding: 14px 20px;
            border-radius: 24px;
            line-height: 1.6;
            font-size: 0.95rem;
            position: relative;
            animation: fadeIn 0.25s ease;
        }
        .message.user {
            align-self: flex-end;
            background: #1e2a3a;
            border-bottom-right-radius: 6px;
        }
        .message.bot {
            align-self: flex-start;
            background: #19212b;
            border-bottom-left-radius: 6px;
        }
        .message .msg-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #7b8aa8;
            margin-top: 8px;
        }
        .message .code-block {
            background: #0d121b;
            border-radius: 12px;
            padding: 12px;
            margin: 10px 0;
            position: relative;
            overflow-x: auto;
        }
        .message .code-block button.copy-btn {
            position: absolute;
            right: 8px;
            top: 8px;
            background: #2a3446;
            border: none;
            color: #b7c9ff;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .message .code-block button.copy-btn:hover { background: #3d4b62; }
        .message .actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .message .actions button {
            background: transparent;
            border: 1px solid #2f3a48;
            border-radius: 30px;
            padding: 3px 14px;
            font-size: 0.7rem;
            color: #9aabca;
            cursor: pointer;
            transition: 0.2s;
        }
        .message .actions button:hover { background: #1e293b; border-color: #5a6e92; }
        .typing-indicator {
            align-self: flex-start;
            background: #19212b;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .typing-indicator .dot {
            width: 8px;
            height: 8px;
            background: #7b8aa8;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.4s infinite;
        }
        .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0.4; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        .input-area {
            background: #141c26;
            padding: 14px 24px;
            border-top: 1px solid #232b36;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .input-area textarea {
            flex: 1;
            background: #1e2631;
            border: 1px solid #2f3a48;
            border-radius: 40px;
            padding: 12px 20px;
            color: #eaeef2;
            resize: none;
            font-size: 0.95rem;
            outline: none;
            line-height: 1.4;
            max-height: 120px;
            font-family: inherit;
        }
        .input-area textarea:focus { border-color: #6c8cff; }
        .input-area .input-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .input-actions button {
            background: #1e2631;
            border: none;
            border-radius: 40px;
            width: 44px;
            height: 44px;
            color: #b7c9ff;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .input-actions button:hover { background: #2c3a4e; color: white; }
        .input-actions button.primary {
            background: #4a6cfa;
            color: white;
        }
        .input-actions button.primary:hover { background: #5f7cff; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #11171f; }
        ::-webkit-scrollbar-thumb { background: #2f3a48; border-radius: 10px; }

        @media (max-width: 700px) { .sidebar { display: none; } }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="brand"><i class="fas fa-brain"></i><span>Brand AI</span> <span class="badge">ChatGPT</span></div>
        <div class="header-actions">
            <button id="newChatBtn" title="New chat"><i class="fas fa-plus-circle"></i></button>
            <button id="stopGenBtn" title="Stop generation"><i class="fas fa-stop-circle"></i></button>
            <button id="regenerateBtn" title="Regenerate"><i class="fas fa-rotate-right"></i></button>
            <span class="status-badge"><i class="fas fa-circle"></i> online</span>
        </div>
    </header>

    <div class="chat-container">
        <aside class="sidebar">
            <div class="new-chat-btn" id="sidebarNewChat"><i class="fas fa-plus"></i> New chat</div>
            <div class="convo-list" id="convoList">
                <div class="item"><i class="fas fa-comment-dots"></i> Welcome</div>
            </div>
            <div style="margin-top: auto; border-top: 1px solid #232b36; padding-top: 14px; font-size:0.75rem; color:#5f7290;">
                <i class="fas fa-database"></i> SQLite · profiles · limits
            </div>
        </aside>

        <div class="chat-main">
            <div class="messages" id="messageContainer">
                <div class="message bot">
                    <strong>Brand AI</strong> – Hello! I'm your AI assistant powered by OpenAI. Ask me anything.
                    <div class="msg-meta"><span>📎 now</span><span>⚡ ready</span></div>
                </div>
            </div>

            <div id="typingIndicator" class="typing-indicator" style="display: none; margin-left: 28px; margin-bottom: 6px;">
                <span>Brand AI</span>
                <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </div>

            <div class="input-area">
                <textarea id="chatInput" rows="1" placeholder="Send a message..."></textarea>
                <div class="input-actions">
                    <button id="sendBtn" class="primary"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- State ----------
            let isGenerating = false;
            let abortController = null;
            let conversationHistory = []; // will be sent to API
            let currentBotMessageDiv = null;
            let fullContent = '';

            // DOM refs
            const msgContainer = document.getElementById('messageContainer');
            const chatInput = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            const typingIndicator = document.getElementById('typingIndicator');
            const stopBtn = document.getElementById('stopGenBtn');
            const regenerateBtn = document.getElementById('regenerateBtn');
            const newChatBtn = document.getElementById('newChatBtn');
            const sidebarNewChat = document.getElementById('sidebarNewChat');

            // ---------- Helpers ----------
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function renderMarkdown(text) {
                let content = text;
                // Code blocks
                content = content.replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
                    return `<div class="code-block"><pre><code class="language-${lang || 'text'}">${escapeHtml(code)}</code></pre><button class="copy-btn" onclick="copyCode(this)"><i class="fas fa-copy"></i> copy</button></div>`;
                });
                // Inline LaTeX (simple)
                content = content.replace(/\\\(([\s\S]*?)\\\)/g, (m, p1) =>
                    `<span style="font-family: 'Courier New', monospace; background: #1a2230; padding: 0 6px; border-radius: 6px;">${escapeHtml(p1)}</span>`
                );
                content = content.replace(/\\\[([\s\S]*?)\\\]/g, (m, p1) =>
                    `<div style="background: #1a2230; padding: 8px 12px; border-radius: 10px; font-family: monospace;">${escapeHtml(p1)}</div>`
                );
                // Bold, italic, inline code
                content = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                content = content.replace(/\*(.*?)\*/g, '<em>$1</em>');
                content = content.replace(/`([^`]+)`/g, '<code style="background:#1a2230;padding:2px 8px;border-radius:4px;">$1</code>');
                return content;
            }

            function addMessage(text, sender, extra = {}) {
                const div = document.createElement('div');
                div.className = `message ${sender}`;
                const rendered = renderMarkdown(text);
                div.innerHTML = rendered + `<div class="msg-meta"><span>${extra.time || new Date().toLocaleTimeString()}</span><span>${extra.tokens || '⚡ ~'}</span></div>`;
                if (sender === 'bot') {
                    const actions = document.createElement('div');
                    actions.className = 'actions';
                    actions.innerHTML = `<button onclick="copyMessage(this)"><i class="fas fa-copy"></i> Copy</button><button onclick="regenerateLast()"><i class="fas fa-repeat"></i> Retry</button>`;
                    div.appendChild(actions);
                }
                msgContainer.appendChild(div);
                msgContainer.scrollTop = msgContainer.scrollHeight;
                div.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
                return div;
            }

            function setTyping(visible) {
                typingIndicator.style.display = visible ? 'flex' : 'none';
                if (visible) msgContainer.scrollTop = msgContainer.scrollHeight;
            }

            // ---------- API call ----------
            async function sendToAPI(messages) {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages })
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'API error');
                }
                return response;
            }

            // ---------- Send message ----------
            async function handleSend() {
                const text = chatInput.value.trim();
                if (!text) return;
                if (isGenerating) return;

                // Add user message
                addMessage(text, 'user');
                chatInput.value = '';
                conversationHistory.push({ role: 'user', content: text });

                // Prepare for bot response
                isGenerating = true;
                setTyping(true);
                abortController = new AbortController();
                fullContent = '';
                currentBotMessageDiv = null;

                try {
                    const response = await sendToAPI(conversationHistory);
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        const chunk = decoder.decode(value);
                        const lines = chunk.split('\n').filter(line => line.trim() !== '');
                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                const data = line.slice(6);
                                if (data === '[DONE]') continue;
                                try {
                                    const parsed = JSON.parse(data);
                                    if (parsed.error) {
                                        throw new Error(parsed.error);
                                    }
                                    const delta = parsed.content || '';
                                    fullContent += delta;

                                    if (!currentBotMessageDiv) {
                                        setTyping(false);
                                        currentBotMessageDiv = document.createElement('div');
                                        currentBotMessageDiv.className = 'message bot';
                                        msgContainer.appendChild(currentBotMessageDiv);
                                    }

                                    // Update with streaming content
                                    const rendered = renderMarkdown(fullContent);
                                    currentBotMessageDiv.innerHTML = rendered + `<div class="msg-meta"><span>streaming...</span><span>⚡ ~</span></div>`;
                                    msgContainer.scrollTop = msgContainer.scrollHeight;
                                } catch (e) {
                                    // skip invalid JSON
                                }
                            }
                        }
                    }

                    // Finalize
                    if (currentBotMessageDiv) {
                        const finalText = fullContent || '(No response)';
                        const rendered = renderMarkdown(finalText);
                        currentBotMessageDiv.innerHTML = rendered + `<div class="msg-meta"><span>${new Date().toLocaleTimeString()}</span><span>⚡ ${Math.round(finalText.length / 4)} tokens</span></div>`;
                        const actions = document.createElement('div');
                        actions.className = 'actions';
                        actions.innerHTML = `<button onclick="copyMessage(this)"><i class="fas fa-copy"></i> Copy</button><button onclick="regenerateLast()"><i class="fas fa-repeat"></i> Retry</button>`;
                        currentBotMessageDiv.appendChild(actions);
                        currentBotMessageDiv.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
                        conversationHistory.push({ role: 'assistant', content: finalText });
                    }

                } catch (error) {
                    if (error.name === 'AbortError') {
                        addMessage('⏹️ Generation stopped.', 'bot');
                    } else {
                        addMessage(`❌ Error: ${error.message}`, 'bot');
                    }
                } finally {
                    isGenerating = false;
                    setTyping(false);
                    abortController = null;
                }
            }

            // ---------- Event listeners ----------
            sendBtn.addEventListener('click', handleSend);
            chatInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            });

            // Stop
            stopBtn.addEventListener('click', () => {
                if (abortController) {
                    abortController.abort();
                    isGenerating = false;
                    setTyping(false);
                }
            });

            // Regenerate
            window.regenerateLast = function() {
                if (isGenerating) return;
                // Remove last bot message
                const msgs = msgContainer.querySelectorAll('.message');
                if (msgs.length > 0 && msgs[msgs.length-1].classList.contains('bot')) {
                    msgs[msgs.length-1].remove();
                }
                // Pop last assistant from history
                if (conversationHistory.length > 0 && conversationHistory[conversationHistory.length-1].role === 'assistant') {
                    conversationHistory.pop();
                }
                // Resend last user message
                const lastUserMsg = conversationHistory[conversationHistory.length-1];
                if (lastUserMsg && lastUserMsg.role === 'user') {
                    chatInput.value = lastUserMsg.content;
                    handleSend();
                }
            };
            regenerateBtn.addEventListener('click', window.regenerateLast);

            // New chat
            function newChat() {
                msgContainer.innerHTML = '';
                conversationHistory = [];
                addMessage('✨ New chat started. Ask me anything!', 'bot');
            }
            newChatBtn.addEventListener('click', newChat);
            sidebarNewChat.addEventListener('click', newChat);

            // Copy message
            window.copyMessage = function(btn) {
                const msg = btn.closest('.message');
                const text = msg.textContent.replace(/CopyRetry/g, '').trim();
                navigator.clipboard.writeText(text).then(() => {
                    btn.innerHTML = '<i class="fas fa-check"></i>';
                    setTimeout(() => btn.innerHTML = '<i class="fas fa-copy"></i> Copy', 1500);
                });
            };

            // Copy code block
            window.copyCode = function(btn) {
                const code = btn.closest('.code-block').querySelector('code');
                if (code) {
                    navigator.clipboard.writeText(code.textContent).then(() => {
                        btn.innerHTML = '<i class="fas fa-check"></i> copied';
                        setTimeout(() => btn.innerHTML = '<i class="fas fa-copy"></i> copy', 1500);
                    });
                }
            };

            // Autosize textarea
            chatInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });

            // Init
            console.log('🚀 Brand AI · ChatGPT clone · Railway ready');
        })();
    </script>
</body>
</html>
